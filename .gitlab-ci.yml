# @druumen/sessions-db CI/CD
#
# Standalone repo extracted from druumen monorepo 2026-05-12.
# Canonical GitLab: gitlab.tinfant.org/druumen/sessions-db
# Public mirror:    github.com/druumen/sessions-db (read-only, pushed by mirror-to-github job)

stages:
  - test
  - deploy
  - publish

# -----------------------------------------------------------------------------
# Test: Linux runner — Node 20, 436+ tests
# -----------------------------------------------------------------------------
test-linux:
  stage: test
  image: node:20-bookworm
  script:
    - npm ci --no-audit --no-fund || npm install --no-audit --no-fund
    - npm test
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Also run on fix/* + feat/* branches so the mirror-to-github job
    # (which depends on test-linux via needs:) can fire and feed branches
    # to GitHub Actions Windows CI for Windows-fix iteration.
    - if: $CI_COMMIT_BRANCH =~ /^fix\//
    - if: $CI_COMMIT_BRANCH =~ /^feat\//
    - if: $CI_COMMIT_TAG

# -----------------------------------------------------------------------------
# Mirror to GitHub: triggered on master push or tag push.
#
# Requires CI variable GITHUB_MIRROR_TOKEN (masked + protected):
#   - Fine-grained PAT from cockpit user (90d expiry, rotate per RELEASING.md)
#   - Resource owner: druumen GitHub org
#   - Repository access: only druumen/sessions-db
#   - Permissions: Contents R/W + Metadata R
# -----------------------------------------------------------------------------
mirror-to-github:
  stage: deploy
  image:
    name: alpine/git:latest
    # alpine/git image has ENTRYPOINT git; GitLab runs scripts via sh -c.
    # Override to empty entrypoint so the shell wrapper works.
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - |
      if [ -z "${GITHUB_MIRROR_TOKEN}" ]; then
        echo "ERROR: GITHUB_MIRROR_TOKEN not set. Cockpit user must add masked+protected CI variable."
        echo "Spec: fine-grained PAT, druumen org, druumen/sessions-db only, Contents R/W + Metadata R, 90d expiry."
        exit 1
      fi
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/druumen/sessions-db.git"
    # GitLab CI checks out as detached HEAD; no local branch ref exists.
    # Use $CI_COMMIT_REF_NAME to mirror the same branch name to GitHub
    # (master → master, fix/foo → fix/foo, etc.). Tag pushes mirror the
    # commit to master AND push tag refs.
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        # Tag push: tag commit usually sits on master; mirror commit + tag.
        git push --force github "HEAD:refs/heads/master"
        git push --force --tags github
      else
        # Branch push (master or fix/feat/*): mirror to same-named branch.
        git push --force github "HEAD:refs/heads/${CI_COMMIT_REF_NAME}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Fix / feat branches also mirror so GitHub Actions Windows CI can
    # run against them. Master is canonical; these branch mirrors are
    # ephemeral (deleted when branch is merged/removed on GitLab side
    # via post-merge cleanup or manual `git push github :branch-name`).
    - if: $CI_COMMIT_BRANCH =~ /^fix\//
      when: on_success
    - if: $CI_COMMIT_BRANCH =~ /^feat\//
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success
  needs:
    - job: test-linux
      artifacts: false

# -----------------------------------------------------------------------------
# Publish (BOOTSTRAP path — one-time for v0.1.0 first publish).
#
# This job uses NPM_TOKEN_BOOTSTRAP, a one-time Granular Access Token
# created on npm web with 48h expiry, masked + protected in GitLab CI
# variables, environment-scoped to `npm-publish`. It is REVOKED
# immediately after v0.1.0 lands on the registry.
#
# All releases after v0.1.0 publish via the GitHub Actions OIDC path
# (.github/workflows/publish.yml), which emits npm provenance and
# requires no long-lived secrets. See RELEASING.md for full procedure.
#
# Trigger: manual, only on annotated tags matching vX.Y.Z. The `manual`
# rule prevents accidental publish on tag push; an operator must click
# "Run" in the GitLab pipeline UI.
# -----------------------------------------------------------------------------
publish-npm:
  stage: publish
  image: node:20-bookworm
  environment:
    name: npm-publish
  script:
    - |
      if [ -z "${NPM_TOKEN_BOOTSTRAP}" ]; then
        echo "ERROR: NPM_TOKEN_BOOTSTRAP not set."
        echo ""
        echo "This is the BOOTSTRAP path (one-time for v0.1.0)."
        echo "After v0.1.0 lands on npm and trusted publisher is configured,"
        echo "all subsequent releases use the OIDC path via GitHub Actions"
        echo "(.github/workflows/publish.yml). See RELEASING.md."
        echo ""
        echo "If this is the v0.1.0 publish, the cockpit user must:"
        echo "  1. Generate a Granular Access Token on npm web (48h expiry,"
        echo "     @druumen scope, Read+Write)."
        echo "  2. Add to GitLab CI variables as NPM_TOKEN_BOOTSTRAP,"
        echo "     masked + protected, environment scope: npm-publish."
        echo "  3. Re-run this job."
        echo "  4. REVOKE the token immediately after publish lands."
        exit 1
      fi
    - |
      # Sanity: version in package.json must match tag (no -dev suffix).
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
        echo "ERROR: package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})."
        echo "Bump package.json and CHANGELOG.md before tagging. See RELEASING.md."
        exit 1
      fi
    - npm ci --no-audit --no-fund
    - npm test
    - npm pack --dry-run
    # Configure registry auth via env var (avoids writing token to disk
    # via `npm config set` which would persist in the CI runner's
    # ~/.npmrc — env-var form is process-local).
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN_BOOTSTRAP}" > .npmrc
    - npm publish --access public
    # Cleanup the .npmrc immediately (defense in depth — runner is
    # ephemeral anyway, but this avoids the token surfacing in any
    # post-job artifact collection).
    - rm -f .npmrc
    - |
      echo ""
      echo "Bootstrap publish complete. Next steps (cockpit user, manual):"
      echo "  1. Verify: npm view @druumen/sessions-db@${TAG_VERSION}"
      echo "  2. REVOKE NPM_TOKEN_BOOTSTRAP on npm web."
      echo "  3. DELETE NPM_TOKEN_BOOTSTRAP CI variable in GitLab."
      echo "  4. Configure trusted publisher on npm web (see RELEASING.md)."
      echo "  5. From v0.1.1 onward, publishes go through GitHub Actions OIDC."
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
      allow_failure: false
