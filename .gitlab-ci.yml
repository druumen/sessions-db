# @druumen/sessions-db CI/CD
#
# Standalone repo extracted from druumen monorepo 2026-05-12.
# Canonical GitLab: gitlab.tinfant.org/druumen/sessions-db
# Public mirror:    github.com/druumen/sessions-db (read-only, pushed by mirror-to-github job)

stages:
  - test
  - deploy
  - publish

# -----------------------------------------------------------------------------
# Test: Linux runner — Node 20, 436+ tests
# -----------------------------------------------------------------------------
test-linux:
  stage: test
  image: node:20-bookworm
  script:
    - npm ci --no-audit --no-fund || npm install --no-audit --no-fund
    # Build freshness gate: run the build now, then diff against the
    # committed artifacts. If lib/index.cjs or any types/*.d.mts file
    # would change, the contributor forgot to run `npm run build`
    # before commit. Catches stale-bundle bugs at PR time, not at
    # publish time.
    - npm run build
    - |
      if ! git diff --exit-code lib/index.cjs types/; then
        echo "ERROR: committed build artifacts are stale relative to source."
        echo "Run 'npm run build' locally and commit the result."
        exit 1
      fi
    - npm test
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Also run on fix/* + feat/* branches so the mirror-to-github job
    # (which depends on test-linux via needs:) can fire and feed branches
    # to GitHub Actions Windows CI for Windows-fix iteration.
    - if: $CI_COMMIT_BRANCH =~ /^fix\//
    - if: $CI_COMMIT_BRANCH =~ /^feat\//
    - if: $CI_COMMIT_TAG

# -----------------------------------------------------------------------------
# Mirror to GitHub: triggered on master push or tag push.
#
# Requires CI variable GITHUB_MIRROR_TOKEN (masked + protected):
#   - Fine-grained PAT from cockpit user (90d expiry, rotate per RELEASING.md)
#   - Resource owner: druumen GitHub org
#   - Repository access: only druumen/sessions-db
#   - Permissions: Contents R/W + Metadata R
# -----------------------------------------------------------------------------
mirror-to-github:
  stage: deploy
  image:
    name: alpine/git:latest
    # alpine/git image has ENTRYPOINT git; GitLab runs scripts via sh -c.
    # Override to empty entrypoint so the shell wrapper works.
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - |
      if [ -z "${GITHUB_MIRROR_TOKEN}" ]; then
        echo "ERROR: GITHUB_MIRROR_TOKEN not set. Cockpit user must add masked+protected CI variable."
        echo "Spec: fine-grained PAT, druumen org, druumen/sessions-db only, Contents R/W + Metadata R, 90d expiry."
        exit 1
      fi
    - git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/druumen/sessions-db.git"
    # GitLab CI checks out as detached HEAD; no local branch ref exists.
    # Use $CI_COMMIT_REF_NAME to mirror the same branch name to GitHub
    # (master → master, fix/foo → fix/foo, etc.). Tag pushes mirror the
    # commit to master AND push tag refs.
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        # Tag push: tag commit usually sits on master; mirror commit + tag.
        git push --force github "HEAD:refs/heads/master"
        git push --force --tags github
      else
        # Branch push (master or fix/feat/*): mirror to same-named branch.
        git push --force github "HEAD:refs/heads/${CI_COMMIT_REF_NAME}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: on_success
    # Fix / feat branches also mirror so GitHub Actions Windows CI can
    # run against them. Master is canonical; these branch mirrors are
    # ephemeral (deleted when branch is merged/removed on GitLab side
    # via post-merge cleanup or manual `git push github :branch-name`).
    - if: $CI_COMMIT_BRANCH =~ /^fix\//
      when: on_success
    - if: $CI_COMMIT_BRANCH =~ /^feat\//
      when: on_success
    - if: $CI_COMMIT_TAG
      when: on_success
  needs:
    - job: test-linux
      artifacts: false

# -----------------------------------------------------------------------------
# Publish (BOOTSTRAP path — one-time for v0.1.0 first publish).
#
# This job uses NPM_TOKEN_BOOTSTRAP, a one-time Granular Access Token
# created on npm web with 48h expiry, masked + protected in GitLab CI
# variables, environment-scoped to `npm-publish`. It is REVOKED
# immediately after v0.1.0 lands on the registry.
#
# All releases after v0.1.0 publish via the GitHub Actions OIDC path
# (.github/workflows/publish.yml), which emits npm provenance and
# requires no long-lived secrets. See RELEASING.md for full procedure.
#
# Trigger: manual, only on annotated tags matching vX.Y.Z. The `manual`
# rule prevents accidental publish on tag push; an operator must click
# "Run" in the GitLab pipeline UI.
# -----------------------------------------------------------------------------
publish-npm:
  stage: publish
  image: node:20-bookworm
  environment:
    name: npm-publish
  script:
    # All steps run inside one bash block so we can install a trap that
    # cleans up the .npmrc credentials file on ANY exit path (success,
    # failure, killed runner). Without the trap, a `npm publish` failure
    # would leave the token-bearing .npmrc in the workspace, potentially
    # surfaced via post-job artifact collection.
    - |
      set -euo pipefail

      # Restrict bootstrap path to v0.1.0 ONLY. From v0.1.1 onward,
      # the OIDC path in .github/workflows/publish.yml is canonical.
      # Defense in depth — also catches the case where NPM_TOKEN_BOOTSTRAP
      # was forgotten in GitLab CI variables after the v0.1.0 revoke.
      if [ "${CI_COMMIT_TAG:-}" != "v0.1.0" ]; then
        echo "ERROR: bootstrap path is one-shot for v0.1.0."
        echo "Tag ${CI_COMMIT_TAG:-<none>} should publish via GitHub Actions OIDC."
        echo "If you really need to publish from GitLab CI, edit this rule explicitly."
        exit 1
      fi

      if [ -z "${NPM_TOKEN_BOOTSTRAP:-}" ]; then
        echo "ERROR: NPM_TOKEN_BOOTSTRAP not set."
        echo ""
        echo "This is the BOOTSTRAP path (one-time for v0.1.0)."
        echo "After v0.1.0 lands on npm and trusted publisher is configured,"
        echo "all subsequent releases use the OIDC path via GitHub Actions"
        echo "(.github/workflows/publish.yml). See RELEASING.md."
        echo ""
        echo "If this is the v0.1.0 publish, the cockpit user must:"
        echo "  1. Generate a Granular Access Token on npm web (48h expiry,"
        echo "     @druumen scope, Read+Write)."
        echo "  2. Add to GitLab CI variables as NPM_TOKEN_BOOTSTRAP,"
        echo "     masked + protected, environment scope: npm-publish."
        echo "  3. Re-run this job."
        echo "  4. REVOKE the token immediately after publish lands."
        exit 1
      fi

      # ---------------------------------------------------------------
      # Pre-flight (1/4): package.json version must match tag.
      # ---------------------------------------------------------------
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
        echo "ERROR: package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})."
        echo "Bump package.json and CHANGELOG.md before tagging. See RELEASING.md."
        exit 1
      fi

      # ---------------------------------------------------------------
      # Pre-flight (2/4): CHANGELOG.md must have a dated header for
      # this version (not "TBD" or "Unreleased").
      # ---------------------------------------------------------------
      CHANGELOG_HEADER=$(grep -E "^## \[${PKG_VERSION}\]" CHANGELOG.md | head -1 || true)
      if [ -z "${CHANGELOG_HEADER}" ]; then
        echo "ERROR: no '## [${PKG_VERSION}]' header found in CHANGELOG.md."
        exit 1
      fi
      if echo "${CHANGELOG_HEADER}" | grep -qiE "TBD|Unreleased"; then
        echo "ERROR: CHANGELOG.md header for ${PKG_VERSION} is not dated:"
        echo "  ${CHANGELOG_HEADER}"
        echo "Replace 'TBD'/'Unreleased' with an ISO date (YYYY-MM-DD) before tagging."
        exit 1
      fi
      if ! echo "${CHANGELOG_HEADER}" | grep -qE "[0-9]{4}-[0-9]{2}-[0-9]{2}"; then
        echo "ERROR: CHANGELOG.md header for ${PKG_VERSION} has no ISO date:"
        echo "  ${CHANGELOG_HEADER}"
        exit 1
      fi

      npm ci --no-audit --no-fund
      npm test

      # ---------------------------------------------------------------
      # Pre-flight (3/4): tarball file allowlist enforcement.
      # Required files in tarball: LICENSE, NOTICE, README.md, CHANGELOG.md,
      # package.json, plus lib/, cli/, types/ directories.
      # ---------------------------------------------------------------
      PACK_JSON=$(npm pack --json --dry-run)
      FILES=$(echo "${PACK_JSON}" | node -e "
        const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
        const files = (data[0] && data[0].files || []).map(f => f.path);
        console.log(files.join('\n'));
      ")
      REQUIRED="LICENSE NOTICE README.md CHANGELOG.md package.json"
      for f in $REQUIRED; do
        if ! echo "${FILES}" | grep -qxE "${f}"; then
          echo "ERROR: required file '${f}' missing from tarball."
          echo "Tarball contents:"
          echo "${FILES}" | sed 's/^/  /'
          exit 1
        fi
      done
      # Tests/fixtures/dev state must NOT be in tarball.
      FORBIDDEN_PATTERNS='^__tests__/|^test/|^tests/|^\.gitlab-ci\.yml|^\.github/|^tickets/|^RELEASING\.md$|\.npmrc$'
      if echo "${FILES}" | grep -qE "${FORBIDDEN_PATTERNS}"; then
        echo "ERROR: tarball contains forbidden paths:"
        echo "${FILES}" | grep -E "${FORBIDDEN_PATTERNS}" | sed 's/^/  /'
        exit 1
      fi

      # ---------------------------------------------------------------
      # Pre-flight (4/4): no uncommitted changes (CI normally clean,
      # but defensive against runners with stale checkouts).
      # ---------------------------------------------------------------
      if [ -n "$(git status --porcelain 2>/dev/null || true)" ]; then
        echo "ERROR: working tree dirty:"
        git status --short
        exit 1
      fi

      # ---------------------------------------------------------------
      # Publish — credentials lifecycle scoped to a temp NPM_CONFIG_USERCONFIG.
      # Trap guarantees the file is removed even if `npm publish` is
      # killed by signal or fails. The temp file is mode 0600 and
      # outside the workspace (so a forgotten artifact upload would
      # still not surface it).
      # ---------------------------------------------------------------
      NPMRC_TMP=$(mktemp -t npmrc.XXXXXX)
      chmod 0600 "${NPMRC_TMP}"
      trap 'rm -f "${NPMRC_TMP}"' EXIT INT TERM
      echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN_BOOTSTRAP}" > "${NPMRC_TMP}"
      export NPM_CONFIG_USERCONFIG="${NPMRC_TMP}"

      npm publish --access public

      echo ""
      echo "Bootstrap publish complete. Next steps (cockpit user, manual):"
      echo "  1. Verify: npm view @druumen/sessions-db@${TAG_VERSION}"
      echo "  2. REVOKE NPM_TOKEN_BOOTSTRAP on npm web."
      echo "  3. DELETE NPM_TOKEN_BOOTSTRAP CI variable in GitLab."
      echo "  4. Configure trusted publisher on npm web (see RELEASING.md)."
      echo "  5. From v0.1.1 onward, publishes go through GitHub Actions OIDC."
  rules:
    # Match strict semver. The bootstrap path additionally enforces
    # `CI_COMMIT_TAG == "v0.1.0"` inside the script so a stray manual
    # click on a v0.1.1+ tag refuses fast.
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
      allow_failure: false
