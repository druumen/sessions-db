name: Publish to npm (OIDC)

# Steady-state publish path for v0.1.1 onwards.
#
# Authenticates via OIDC trusted publishing (configured on npm web for
# druumen/sessions-db → workflow filename `publish.yml` → environment
# `npm-publish`). No long-lived NPM_TOKEN stored anywhere — npm registry
# validates the short-lived OIDC token issued by GitHub Actions for this
# specific workflow run.
#
# Emits npm provenance (SLSA-style cryptographically signed build
# attestation) via `--provenance`.
#
# Trigger: tag push matching vX.Y.Z (strict semver, no pre-release).
# The tag is mirrored from GitLab CI's `mirror-to-github` job (canonical
# CI lives at gitlab.tinfant.org).
#
# This workflow is INACTIVE until cockpit user completes Bootstrap step 7
# in RELEASING.md (configures trusted publisher on npm web). Until then,
# the v0.1.0 bootstrap publish path runs from GitLab CI `publish-npm` job
# using NPM_TOKEN_BOOTSTRAP.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  # OIDC token issuance + npm provenance attestation publishing.
  id-token: write
  # No write to repository contents needed; the workflow only reads + publishes.
  contents: read

jobs:
  publish:
    name: Publish to npm via OIDC
    runs-on: ubuntu-latest
    # Skip v0.1.0 — that tag publishes via the GitLab CI bootstrap path
    # (NPM_TOKEN_BOOTSTRAP), because npm web trusted publisher cannot
    # be configured until the package exists on the registry. Without
    # this skip, the v0.1.0 tag would produce a guaranteed red OIDC run.
    if: github.ref_name != 'v0.1.0'
    # The `npm-publish` environment matches the trusted publisher config
    # on npm web. Renaming this environment requires updating npm web
    # too. See RELEASING.md rotation policy.
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@druumen/sessions-db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: package.json version (${PKG_VERSION}) does not match tag (${TAG_VERSION})."
            echo "See RELEASING.md pre-flight checks."
            exit 1
          fi
          echo "OK: package.json ${PKG_VERSION} == tag ${TAG_VERSION}"

      - name: Verify CHANGELOG has dated header
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          HEADER=$(grep -E "^## \[${PKG_VERSION}\]" CHANGELOG.md | head -1 || true)
          if [ -z "${HEADER}" ]; then
            echo "ERROR: no '## [${PKG_VERSION}]' header in CHANGELOG.md."
            exit 1
          fi
          if echo "${HEADER}" | grep -qiE "TBD|Unreleased"; then
            echo "ERROR: CHANGELOG header for ${PKG_VERSION} is not dated:"
            echo "  ${HEADER}"
            exit 1
          fi
          if ! echo "${HEADER}" | grep -qE "[0-9]{4}-[0-9]{2}-[0-9]{2}"; then
            echo "ERROR: CHANGELOG header for ${PKG_VERSION} has no ISO date:"
            echo "  ${HEADER}"
            exit 1
          fi
          echo "OK: ${HEADER}"

      - name: Pack dry-run + verify tarball allowlist
        run: |
          PACK_JSON=$(npm pack --json --dry-run)
          FILES=$(echo "${PACK_JSON}" | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const files = (data[0] && data[0].files || []).map(f => f.path);
            console.log(files.join('\n'));
          ")
          for f in LICENSE NOTICE README.md CHANGELOG.md package.json; do
            if ! echo "${FILES}" | grep -qxE "${f}"; then
              echo "ERROR: required file '${f}' missing from tarball."
              echo "Tarball contents:"
              echo "${FILES}" | sed 's/^/  /'
              exit 1
            fi
          done
          if echo "${FILES}" | grep -qE '^__tests__/|^test/|^tests/|^\.gitlab-ci\.yml|^\.github/|^tickets/|^RELEASING\.md$|\.npmrc$'; then
            echo "ERROR: tarball contains forbidden paths:"
            echo "${FILES}" | grep -E '^__tests__/|^test/|^tests/|^\.gitlab-ci\.yml|^\.github/|^tickets/|^RELEASING\.md$|\.npmrc$' | sed 's/^/  /'
            exit 1
          fi
          echo "OK: tarball allowlist enforced."

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN env — OIDC handles auth via setup-node's
        # registry-url config + npm CLI's built-in trusted publisher
        # support (npm >= 9.5.0, included in Node 20).

      - name: Print verification commands
        run: |
          echo "Published. Verify:"
          echo "  npm view @druumen/sessions-db@${GITHUB_REF_NAME#v}"
          echo "  npm view @druumen/sessions-db@${GITHUB_REF_NAME#v} --json | jq .dist.attestations"
